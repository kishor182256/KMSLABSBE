services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env.example
    volumes:
      - ../backend/uploaded_voice_samples:/app/uploaded_voice_samples
      - ../backend/voice_profiles:/app/voice_profiles
      - ../backend/generated_audio_outputs:/app/generated_audio_outputs
      - ../backend/temporary_processing_files:/app/temporary_processing_files
